<ion-header>
  <ion-toolbar>
    <ion-title>Create Account</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-label position="stacked">Name</ion-label>
      <ion-input
        type="text"
        formControlName="name"
        placeholder="Your name"
        autocomplete="name"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Email</ion-label>
      <ion-input
        type="email"
        formControlName="email"
        placeholder="you@example.com"
        autocomplete="email"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Password</ion-label>
      <ion-input
        type="password"
        formControlName="password"
        placeholder="••••••"
        autocomplete="new-password"
      ></ion-input>
    </ion-item>

    <div class="ion-padding-top ion-padding-horizontal">
      <ion-label>Profile Photo (optional)</ion-label>
      <input
        type="file"
        accept="image/*"
        (change)="onFileChange($event)"
        style="margin-top: 8px; display: block;"
      />
      <p *ngIf="selectedFile()" style="font-size: 0.85em; color: gray;">
        Selected: {{ selectedFile()?.name }}
      </p>
    </div>

    <div class="ion-padding-top">
      <ion-button expand="block" type="submit" [disabled]="form.invalid">
        Create Account
      </ion-button>
    </div>
  </form>

  <div class="ion-text-center ion-padding-top">
    <p>Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</ion-content>
