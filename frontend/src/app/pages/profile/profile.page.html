<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mi Perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onLogout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ng-container *ngIf="user(); else loading">

    <!-- Avatar -->
    <div class="avatar-section">
      <app-avatar
        [avatarUrl]="user()?.avatar_url"
        [name]="user()?.name || ''"
      ></app-avatar>
      <div class="ion-padding-top">
        <label class="change-photo-btn">
          Cambiar foto
          <input
            type="file"
            accept="image/*"
            style="display: none;"
            (change)="onAvatarChange($event)"
          />
        </label>
      </div>
    </div>

    <!-- Vibe selector -->
    <div class="section-block">
      <ion-label class="section-title">Mi Vibe</ion-label>
      <div class="vibe-chips">
        <div
          *ngFor="let v of vibes"
          class="vibe-chip"
          [class.selected]="selectedVibe() === v.label"
          (click)="selectVibe(v.label)"
        >
          <span class="vibe-emoji">{{ v.emoji }}</span>
          <span class="vibe-name">{{ v.label }}</span>
        </div>
      </div>
    </div>

    <!-- Edit form -->
    <form [formGroup]="form" (ngSubmit)="onSave()">
      <ion-item>
        <ion-label position="stacked">Nombre</ion-label>
        <ion-input
          type="text"
          formControlName="name"
          placeholder="Tu nombre"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Biografía</ion-label>
        <ion-textarea
          formControlName="bio"
          placeholder="Cuéntanos sobre ti..."
          rows="3"
        ></ion-textarea>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Intereses (separados por coma)</ion-label>
        <ion-input
          type="text"
          formControlName="interests"
          placeholder="ej: fútbol, música, películas"
        ></ion-input>
      </ion-item>

      <div class="ion-padding-top">
        <ion-button expand="block" type="submit" [disabled]="saving()">
          <ion-spinner *ngIf="saving()" name="crescent"></ion-spinner>
          <span *ngIf="!saving()">Guardar cambios</span>
        </ion-button>
      </div>
    </form>

    <!-- Logout -->
    <div class="ion-padding-top">
      <ion-button expand="block" fill="outline" color="danger" (click)="onLogout()">
        Cerrar sesión
      </ion-button>
    </div>

  </ng-container>

  <ng-template #loading>
    <div class="center">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  </ng-template>
</ion-content>
